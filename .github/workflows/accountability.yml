name: SEOS Accountability Check
on:
  schedule:
    - cron: '30 8 * * *' # 2:00pm IST (UTC+5:30)
  workflow_dispatch:

jobs:
  accountability:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Accountability Check
        run: |
          curl -X POST "${{ secrets.API_URL }}/api/proactive/accountability" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error
